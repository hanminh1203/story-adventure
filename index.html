<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Flythrough Map</title>

  <!-- CesiumJS - free, open-source (Apache 2.0), no API key required for this setup -->
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="gameplay-screen">
    <div id="cesiumContainer"></div>

    <div class="ui">
      <div id="score-panel">
        <div class="score-stat">
          <div id="score-label" class="panel-label">Points</div>
          <div id="score-value">0</div>
        </div>
        <div class="score-stat">
          <div class="panel-label">Lessons</div>
          <div id="lessons-value">0/6</div>
        </div>
      </div>

      <div id="nav-controls">
        <button id="prev-btn" class="nav-button" aria-label="Previous location" title="Previous (left arrow)">&#8592;</button>
        <button id="next-btn" class="nav-button" aria-label="Next location" title="Next (right arrow)">&#8594;</button>
      </div>

      <div id="pin-panel" class="pin-panel"></div>

      <div id="guide-panel" class="guide-panel" aria-live="polite">
        <div class="guide-avatar" id="guide-avatar"></div>
        <div class="guide-bubble">
          <div class="guide-name" id="guide-name"></div>
          <h3 id="guide-title"></h3>
          <p id="guide-text"></p>
          <div id="guide-question-wrap" class="guide-question-wrap">
            <p id="guide-question" class="guide-question"></p>
            <div id="guide-options" class="guide-options"></div>
            <p id="guide-feedback" class="guide-feedback" aria-live="polite"></p>
          </div>
          <button id="guide-continue-btn" class="guide-continue-btn" type="button">Got it!</button>
        </div>
      </div>

      <div id="details-modal" class="details-modal" aria-hidden="true">
        <div class="details-dialog" role="dialog" aria-modal="true" aria-labelledby="details-title">
          <button id="details-close-btn" class="details-close-btn" type="button"
            aria-label="Close details">&#215;</button>
          <h2 id="details-title"></h2>
          <p id="details-description"></p>
          <div id="details-slideshow" class="details-slideshow"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="start-screen" class="game-screen active">
    <div class="game-screen-content start-content">
      <div class="game-kicker">Flythrough Hunt</div>
      <h1>Duck Quest</h1>
      <p>Travel the map with Red, learn how to stay safe at each stop, and collect hidden ducks in the photo slideshow.</p>
      <button id="start-btn" class="game-screen-btn" type="button">START</button>
    </div>
  </div>

  <div id="final-screen" class="game-screen hidden" aria-hidden="true">
    <div class="game-screen-content final-content">
      <div class="game-kicker">Final Score</div>
      <h1 id="final-score">0</h1>
      <p>points collected</p>
      <button id="restart-btn" class="game-screen-btn" type="button">RESTART</button>
    </div>
  </div>

  <script src="locations.js"></script>
  <script src="script.js"></script>
</body>

</html>
