<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Path of Hope - Little Travelers</title>

  <!-- CesiumJS - free, open-source (Apache 2.0), no API key required for this setup -->
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="gameplay-screen">
    <div id="cesiumContainer"></div>

    <div class="ui">
      <div id="score-panel">
        <div id="score-label" class="panel-label">Points</div>
        <div id="score-value">0</div>
      </div>

      <div id="nav-controls">
        <button id="prev-btn" class="nav-button" aria-label="Previous location" title="Previous (left arrow)">&#8592;</button>
        <button id="next-btn" class="nav-button" aria-label="Next location" title="Next (right arrow)">&#8594;</button>
      </div>

      <div id="pin-panel" class="pin-panel"></div>

      <div id="details-modal" class="details-modal" aria-hidden="true">
        <div class="details-dialog" role="dialog" aria-modal="true" aria-labelledby="details-title">
          <button id="details-close-btn" class="details-close-btn" type="button"
            aria-label="Close details">&#215;</button>
          <h2 id="details-title"></h2>
          <p id="details-description"></p>
          <div id="details-slideshow" class="details-slideshow"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="start-screen" class="game-screen active static-background">
    <div class="game-screen-overlay"></div>
    <div class="container game-screen-content start-content">
      <h1>Magical Story Adventures</h1>
      <p>Step into a world where children can explore countries, cultures, landmarks, stories, and magical adventures through an interactive online journey inspired by Google Earth.</p>
      <button id="start-btn" class="game-screen-btn" type="button">LET'S GO!</button>
    </div>
  </div>

  <div id="character-select-screen" class="game-screen hidden static-background" aria-hidden="true">
    <div class="game-screen-overlay"></div>
    <div class="game-screen-ui position-absolute w-100 h-100">
      <button id="character-select-go-back-btn" class="game-screen-btn go-back-btn">
        &#8592; <span class="d-sm-inline-block d-none">Go back</span>
      </button>
    </div>
    <div class="container game-screen-content character-select-content">
      <h1>Meet your guides</h1>
      <div class="character-carousel" id="character-carousel">
        <button type="button" class="carousel-arrow carousel-arrow-prev" id="character-prev-btn" aria-label="Previous character">&#8249;</button>
        <div class="character-grid" id="character-grid"></div>
        <button type="button" class="carousel-arrow carousel-arrow-next" id="character-next-btn" aria-label="Next character">&#8250;</button>
      </div>
    </div>
  </div>

  <div id="final-screen" class="game-screen hidden" aria-hidden="true">
    <div class="container game-screen-content final-content">
      <div class="game-kicker">Final Score</div>
      <h1 id="final-score">0</h1>
      <p>points collected</p>
      <button id="restart-btn" class="game-screen-btn" type="button">RESTART</button>
    </div>
  </div>

  <!-- ── Reusable HTML templates (never rendered directly) ──────────────── -->

  <!-- Pin panel: location label + title + description + "Show details" CTA -->
  <template id="tpl-pin-panel">
    <div>
      <div class="panel-label"></div>
      <h2 class="panel-title"></h2>
      <p class="panel-description"></p>
      <button type="button" class="pin-details-btn">Show details</button>
    </div>
  </template>

  <!-- Slideshow frame: image, collectibles layer, prev/next slide buttons -->
  <template id="tpl-slideshow-frame">
    <div class="slideshow-frame">
      <img alt="">
      <div class="collectibles-layer"></div>
      <button type="button" class="slideshow-btn slideshow-btn-previous" aria-label="previous image">&#8592;</button>
      <button type="button" class="slideshow-btn slideshow-btn-next"      aria-label="next image">&#8594;</button>
    </div>
  </template>

  <!-- Slideshow meta: "1 / 3" counter -->
  <template id="tpl-slideshow-meta">
    <div class="slideshow-meta"></div>
  </template>

  <!-- Slideshow thumbnail strip -->
  <template id="tpl-slideshow-thumbnails">
    <div class="slideshow-thumbnails"></div>
  </template>

  <!-- Single thumbnail button (cloned once per image) -->
  <template id="tpl-thumbnail-btn">
    <button type="button"><img alt="" loading="lazy"></button>
  </template>

  <!-- Single collectible duck button (cloned once per duck) -->
  <template id="tpl-collectible">
    <button type="button" class="collectible-item" aria-label="Collect duck for 1 point">
      <img alt="">
    </button>
  </template>

  <!-- Empty-state message shown when a location has no images -->
  <template id="tpl-slideshow-empty">
    <p class="details-empty">No images have been added for this location yet.</p>
  </template>

  <script src="locations.js"></script>
  <script src="script.js"></script>
</body>

</html>
